apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-blue-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentiment-api
      slot: blue
  template:
    metadata:
      labels:
        app: sentiment-api
        slot: blue
    spec:
      containers:
      - name: api
        image: Saim687/sentiment-api:unstable
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: log-volume
          mountPath: /app/logs
      volumes:
      - name: log-volume
        persistentVolumeClaim:
          claimName: sentiment-logs-pvc
